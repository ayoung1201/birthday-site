<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{
 margin:0;
 font-family:'Noto Serif KR',serif;
 background:#f5efe6;
 overflow-x:hidden;
 color:#5a4a42;
 text-align:center;
}

/* background particles */
canvas{
 position:fixed;
 top:0;
 left:0;
 z-index:-1;
}

.section{
 min-height:100vh;
 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
 padding:40px 20px;
}

h1{font-size:48px;margin-bottom:10px}
.subtitle{opacity:.8;margin-bottom:40px}

/* cake */
.cake{
 position:relative;
 width:140px;
 height:100px;
 background:#e6cfc2;
 border-radius:10px;
 margin-top:20px;
}

.candle{
 position:absolute;
 top:-40px;
 left:50%;
 transform:translateX(-50%);
 width:12px;
 height:40px;
 background:white;
 border-radius:4px;
}

.flame{
 position:absolute;
 top:-14px;
 left:50%;
 transform:translateX(-50%);
 width:16px;
 height:16px;
 background:#ffd27a;
 border-radius:50%;
 animation:flicker .4s infinite alternate;
}

@keyframes flicker{
 from{transform:translateX(-50%) scale(1)}
 to{transform:translateX(-50%) scale(1.2)}
}

/* button */
button{
 margin-top:30px;
 padding:12px 28px;
 border:none;
 border-radius:20px;
 background:#e8dfd3;
 cursor:pointer;
 font-size:16px;
 color:#5a4a42;
 -webkit-appearance:none;
 appearance:none;
}

button:focus,
button:active{
 color:#5a4a42;
 outline:none;
}

/* typing letter */
.letter{
 max-width:600px;
 line-height:1.8;
 font-size:18px;
 background:rgba(255,255,255,.6);
 padding:40px;
 border-radius:20px;
 backdrop-filter:blur(6px);
 min-height:200px;
}

/* gallery */
.gallery{
 position:relative;
 width:80%;
 max-width:600px;
 overflow:hidden;
 border-radius:16px;
}

.gallery img{
 width:100%;
 display:none;
}

.gallery img.active{display:block}

/* gift */
.gift{
 font-size:60px;
 cursor:pointer;
 transition:transform .3s;
}

.gift:hover{transform:scale(1.1)}

.hidden{display:none}

</style>
</head>
<body>

<canvas id="bg"></canvas>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2d2d4e7a6c.mp3?filename=happy-birthday-to-you-piano-version-13976.mp3" type="audio/mpeg">
</audio>

<section class="section">
<h1>Happy Birthday 🎂</h1>
<div class="subtitle">오늘은 세상에서 가장 특별한 날</div>

<div class="cake" onclick="blowCandle()">
<div class="candle">
<div class="flame" id="flame"></div>
</div>
</div>

<div>촛불을 클릭해서 꺼봐 ✨</div>
</section>

<section class="section">
<h2>💌 편지</h2>
<div class="letter" id="letter"></div>
<button onclick="startTyping()">편지 읽기</button>
</section>

<section class="section">
<h2>📸 Memories</h2>
<div class="gallery">
<img class="active" src="https://images.unsplash.com/photo-1519681393784-d120267933ba">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
</div>
</section>

<section class="section">
<h2>🎁 마지막 선물</h2>
<div class="gift" onclick="openGift()">🎁</div>

<div id="surprise" class="hidden">
<h3>선물 하나 골라봐 🎉</h3>
<p>오늘은 특별한 날이니까 하나 쏠게 😌</p>

<div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:20px">
<button onclick="chooseGift('olive')">🫒 올리브영</button>
<button onclick="chooseGift('baemin')">🍗 배민</button>
</div>

<div id="giftResult" style="margin-top:25px;font-size:18px"></div>

</div>
</section>

<script>

/* candle */
function blowCandle(){
 document.getElementById('flame').style.display='none'
}

/* typing letter */
const text=`생일 정말 축하해.

네가 태어난 덕분에 세상이 조금 더 따뜻해진 것 같아.
오늘은 평소보다 더 많이 웃고,
더 행복한 하루가 되었으면 좋겠다.

앞으로의 모든 날들도
지금처럼 멋진 순간들로 가득하길 바라.`

let i=0
function startTyping(){
 const el=document.getElementById('letter')
 el.innerHTML=''
 const interval=setInterval(()=>{
 el.innerHTML+=text[i]
 i++
 if(i>=text.length)clearInterval(interval)
 },40)
}

/* slideshow */
const slides=document.querySelectorAll('.gallery img')
let index=0
setInterval(()=>{
 slides[index].classList.remove('active')
 index=(index+1)%slides.length
 slides[index].classList.add('active')
},3000)

/* gift */
function openGift(){
 document.getElementById('surprise').classList.remove('hidden')
}

function chooseGift(type){
 const result=document.getElementById('giftResult')

 if(type==='olive'){
  result.innerHTML='🫒 올리브영 당첨! 원하는 거 하나 고르기 ✨'
 }

 if(type==='baemin'){
  result.innerHTML='🍗 배민 당첨! 오늘은 맛있는 거 먹자 😋'
 }
}

/* particles */
const canvas=document.getElementById('bg')
const ctx=canvas.getContext('2d')
canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]
for(let i=0;i<80;i++){
 particles.push({
 x:Math.random()*canvas.width,
 y:Math.random()*canvas.height,
 r:Math.random()*2+1,
 d:Math.random()*1
 })
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height)
 ctx.fillStyle='rgba(255,255,255,0.6)'
 particles.forEach(p=>{
 ctx.beginPath()
 ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
 ctx.fill()
 p.y+=p.d
 if(p.y>canvas.height)p.y=0
 })
 requestAnimationFrame(draw)
}

draw()

</script>

</body>
</html>
