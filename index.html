<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang&family=Gowun+Dodum&family=Noto+Serif+KR:wght@700&display=swap" rel="stylesheet">
<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Gowun Dodum', sans-serif;
background:#f5efe6;
color:#5a4a42;
overflow-x:hidden;
text-align:center;
}

/* 배경 */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* 섹션 */

.section{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:40px 20px;
}

/* 주인공 사진 */

.hero{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:20px;
}

.hero img{
width:200px;
height:200px;
object-fit:cover;
border-radius:50%;
border:6px solid #fff;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
margin-bottom:20px;
animation:fadeIn 2s ease;
}

.hero-name{
font-family:'Gowun Batang', serif;
font-size:22px;
opacity:.9;
margin-bottom:10px;
}

/* 제목 */

h1{
font-family:'Noto Serif KR', serif;
font-size:56px;
font-weight:700;
margin-bottom:20px;
animation:fadeIn 2s ease;
letter-spacing:-1px;
}

.subtitle{
opacity:.8;
margin-bottom:30px;
font-size:18px;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* 케이크 */

.cake{
position:relative;
width:140px;
height:100px;
background:#e6cfc2;
border-radius:10px;
margin-top:30px;
}

.candle{
position:absolute;
top:-40px;
left:50%;
transform:translateX(-50%);
width:12px;
height:40px;
background:white;
border-radius:4px;
}

.flame{
position:absolute;
top:-14px;
left:50%;
transform:translateX(-50%);
width:16px;
height:16px;
background:#ffd27a;
border-radius:50%;
animation:flicker .4s infinite alternate;
}

@keyframes flicker{
from{transform:translateX(-50%) scale(1)}
to{transform:translateX(-50%) scale(1.2)}
}

/* 버튼 */

button{
margin-top:30px;
padding:12px 28px;
border:none;
border-radius:20px;
background:#e8dfd3;
cursor:pointer;
font-size:16px;
font-family:'Gowun Dodum';
color:#5a4a42;
-webkit-appearance:none;
appearance:none;
}

button:focus,
button:active{
color:#5a4a42;
outline:none;
}

/* 편지 */

.letter{
max-width:600px;
line-height:1.9;
font-size:18px;
background:rgba(255,255,255,.6);
padding:40px;
border-radius:20px;
backdrop-filter:blur(6px);
white-space:pre-line;
}

/* 갤러리 */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
width:90%;
max-width:900px;
margin-top:30px;
}

.gallery img{
width:100%;
height:160px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
transition:transform .3s, box-shadow .3s;
}

.gallery img:hover{
transform:scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

/* 사진 확대 */

.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:12px;
}

.modal.active{
display:flex;
}

/* 선물 */

.gift{
font-size:60px;
cursor:pointer;
transition:transform .3s;
}

.gift:hover{
transform:scale(1.1);
}

.hidden{
display:none;
}

.birthday{
color:#d88c9a;
font-weight:700;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2d2d4e7a6c.mp3?filename=happy-birthday-to-you-piano-version-13976.mp3">
</audio>

<section class="section">

<div class="hero">
<img src="images/12.png">
<div class="hero-name">오늘의 주인공 🥳</div>
</div>

<h1>재은아 <span class="birthday"><br>생일 축하해 🎂</span></h1>

<div class="subtitle">
🎊 동국대 최고미녀 임재은 탄생일 🎊
</div>

<p style="margin-bottom:30px;">촛불 클릭!</p>

<div class="cake" onclick="blowCandle()">

<div class="candle">
<div class="flame" id="flame"></div>
</div>

</div>

<p style="margin-top:100px;">이제 밑으로 스크롤해서 편지 확인해봐 공주</p>

</section>

<section class="section">

<h2>💌 편지</h2>

<div class="letter" id="letter"></div>

<button onclick="startTyping()">
편지 읽기
</button>

</section>

<section class="section">

<h2>📸 Memories</h2>

<div class="gallery">

<img src="images/1.png">
<img src="images/2.png">
<img src="images/3.png">
<img src="images/4.png">
<img src="images/5.png">
<img src="images/6.png">
<img src="images/7.png">
<img src="images/8.png">
<img src="images/9.png">
<img src="images/10.png">
<img src="images/11.png">

</div>

<div id="modal" class="modal" onclick="closeModal()">
<img id="modalImg">
</div>

<section class="section">

<h2>✨ 마지막 페이지 ✨</h2>

<p>오늘의 소원을 하나 빌어봐</p>

<input id="wishInput" placeholder="소원을 적어보세요 ⭐️"
style="padding:12px;border-radius:10px;border:none;margin-top:20px;width:250px">

<br>

<button onclick="makeWish()">소원 보내기 ✨</button>

<div id="wishResult" style="margin-top:25px;font-size:18px"></div>

</section>

<script>

/* 촛불 */

function blowCandle(){
document.getElementById('flame').style.display='none'
startConfetti()
}

/* 편지 */

const text=`To.재은

Happy Birthday!

캠우리를 통해 만난 인연이 너여서 너무 행복해.
수많은 사람들 속에서 우리가 한 팀으로 만나고, 그 팀의 팀장이 너였다는 게 아직도 참 신기하고 고마워.
항상 누구보다 먼저 고민하고, 우리를 챙겨주고, 묵묵히 팀을 이끌어줘서 덕분에 우리는 더 즐겁고 따뜻하게 그 시간을 보낼 수 있었던 것 같아. 
나에게 캠우리의 기억을 떠올리면 가장 먼저 재은이가 생각나.
아마 너는 별것 아닌 일처럼 생각할지도 모르지만 누군가에게는 그렇게 마음 써주는 사람이 있다는 것 자체가 정말 큰 힘이 되더라.
너를 보며 나도 많이 배우고 더 성장할 수 있었어🥰
앞으로 재은이가 하고 싶은 일, 이루고 싶은 꿈들이 하나씩 다 이루어지길 진심으로 바라. 
재은이가 가진 따뜻함과 진심이라면 어디에서든 분명 많은 사람들에게 좋은 영향을 줄 거라고 믿어.

우리의 인연이 그때의 추억으로만 끝나는 게 아니라, 오래오래 서로의 삶 속에 남아있는 인연이었으면 좋겠다.

생일 정말 축하해
그리고 우리 팀장이어서, 재은이어서 고마워.

사랑해 재은 🤍
From.아영`

let i=0

function startTyping(){

const el=document.getElementById("letter")

el.innerHTML=""

const interval=setInterval(()=>{

el.innerHTML+=text[i]

i++

if(i>=text.length)clearInterval(interval)

},40)

}

/* 폭죽 */

function startConfetti(){

for(let i=0;i<150;i++){

const confetti=document.createElement("div")

confetti.style.position="fixed"
confetti.style.width="8px"
confetti.style.height="8px"
confetti.style.background="hsl("+Math.random()*360+",70%,70%)"
confetti.style.left=Math.random()*window.innerWidth+"px"
confetti.style.top="-10px"
confetti.style.borderRadius="50%"
confetti.style.zIndex="9999"

document.body.appendChild(confetti)

let fall=Math.random()*3+2

const anim=setInterval(()=>{

confetti.style.top=(confetti.offsetTop+fall)+"px"
confetti.style.left=(confetti.offsetLeft+(Math.random()*4-2))+"px"

if(confetti.offsetTop>window.innerHeight){
confetti.remove()
clearInterval(anim)
}

},20)

}

}

/* 사진 확대 */

const galleryImages=document.querySelectorAll(".gallery img")
const modal=document.getElementById("modal")
const modalImg=document.getElementById("modalImg")

galleryImages.forEach(img=>{
img.addEventListener("click",()=>{
modal.classList.add("active")
modalImg.src=img.src
})
})

function closeModal(){
modal.classList.remove("active")
}

/* 파티클 */

const canvas=document.getElementById('bg')
const ctx=canvas.getContext('2d')

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<80;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
d:Math.random()*1
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle='rgba(255,255,255,0.6)'

particles.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fill()

p.y+=p.d

if(p.y>canvas.height)p.y=0

})

requestAnimationFrame(draw)

}

function makeWish(){

const wish=document.getElementById("wishInput").value
const result=document.getElementById("wishResult")

if(wish===""){
result.innerHTML="소원을 적어줘"
return
}

result.innerHTML=" 재은이의 소원이 이루어지길 🙏"

startConfetti()

}

draw()

</script>

</body>
</html>
