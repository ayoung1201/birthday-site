<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang&family=Gowun+Dodum&family=Noto+Serif+KR:wght@700&display=swap" rel="stylesheet">
<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Gowun Dodum', sans-serif;
background:linear-gradient(135deg, #f9f5f0 0%, #f5efe6 50%, #ede4d8 100%);
color:#5a4a42;
overflow-x:hidden;
text-align:center;
}

/* 배경 */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* 섹션 */

.section{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:40px 20px;
position:relative;
}

/* 주인공 사진 */

.hero{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:20px;
}

.hero img{
width:220px;
height:220px;
object-fit:cover;
border-radius:50%;
border:8px solid #fff;
box-shadow:0 15px 40px rgba(139,119,101,0.25), 0 0 0 12px rgba(255,255,255,0.5);
margin-bottom:20px;
animation:fadeInScale 2s ease;
}

.hero-name{
font-family:'Gowun Batang', serif;
font-size:24px;
opacity:.9;
margin-bottom:10px;
font-weight:600;
color:#8b7765;
}

/* 제목 */

h1{
font-family:'Noto Serif KR', serif;
font-size:56px;
font-weight:700;
margin-bottom:20px;
animation:fadeInScale 2s ease;
letter-spacing:-1px;
text-shadow:2px 2px 4px rgba(0,0,0,0.05);
color:#5a4a42;
}

.subtitle{
opacity:.8;
margin-bottom:30px;
font-size:20px;
padding:12px 24px;
background:rgba(255,255,255,0.7);
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 4px 15px rgba(139,119,101,0.15);
}

@keyframes fadeInScale{
from{
opacity:0;
transform:translateY(30px) scale(0.95);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

/* 케이크 */

.cake{
position:relative;
width:160px;
height:120px;
background:linear-gradient(180deg, #f5d5c8 0%, #e6cfc2 100%);
border-radius:12px;
margin-top:30px;
box-shadow:0 10px 30px rgba(139,119,101,0.2);
cursor:pointer;
transition:transform 0.3s;
}

.cake:hover{
transform:scale(1.05);
}

.cake::before{
content:'';
position:absolute;
top:-8px;
left:50%;
transform:translateX(-50%);
width:140px;
height:15px;
background:#f5d5c8;
border-radius:50%;
box-shadow:0 -2px 8px rgba(139,119,101,0.15);
}

.cake::after{
content:'🎂';
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
font-size:40px;
opacity:0.3;
filter:grayscale(0);
}

.candle{
position:absolute;
top:-50px;
left:50%;
transform:translateX(-50%);
width:14px;
height:50px;
background:linear-gradient(180deg, #fff 0%, #f5efe6 100%);
border-radius:4px;
box-shadow:0 4px 10px rgba(139,119,101,0.15);
}

.candle::before{
content:'';
position:absolute;
top:-5px;
left:50%;
transform:translateX(-50%);
width:20px;
height:8px;
background:#fff;
border-radius:50%;
}

.flame{
position:absolute;
top:-18px;
left:50%;
transform:translateX(-50%);
width:18px;
height:18px;
background:radial-gradient(circle, #fff 0%, #ffd27a 50%, #ff9a4a 100%);
border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
animation:flicker .5s infinite alternate;
box-shadow:0 0 20px #ffd27a, 0 0 30px #ff9a4a;
}

@keyframes flicker{
from{
transform:translateX(-50%) scale(1) translateY(0);
opacity:1;
}
to{
transform:translateX(-50%) scale(1.15) translateY(-2px);
opacity:0.9;
}
}

/* 버튼 */

button{
margin-top:30px;
padding:14px 32px;
border:none;
border-radius:25px;
background:linear-gradient(135deg, #ebe1d5 0%, #e8dfd3 100%);
cursor:pointer;
font-size:17px;
font-family:'Gowun Dodum';
color:#5a4a42;
-webkit-appearance:none;
appearance:none;
box-shadow:0 6px 20px rgba(139,119,101,0.2);
transition:all 0.3s;
font-weight:500;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 25px rgba(139,119,101,0.3);
background:linear-gradient(135deg, #f0e6da 0%, #ebe1d5 100%);
}

button:active{
transform:translateY(0);
}

button:focus,
button:active{
color:#5a4a42;
outline:none;
}

/* 편지 */

.letter{
max-width:650px;
line-height:2;
font-size:18px;
background:rgba(255,255,255,0.85);
padding:50px;
border-radius:25px;
backdrop-filter:blur(10px);
white-space:pre-line;
box-shadow:0 10px 40px rgba(139,119,101,0.15);
border:2px solid rgba(255,255,255,0.9);
color:#5a4a42;
min-height:200px;
position:relative;
}

.letter.empty{
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
gap:20px;
background:linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(245,239,230,0.9) 100%);
}

.letter.empty::before{
content:'💌';
font-size:80px;
animation:float 3s ease-in-out infinite;
}

.letter.empty::after{
content:'편지를 읽어보세요';
font-size:20px;
color:#8b7765;
opacity:0.7;
font-family:'Gowun Batang', serif;
}

@keyframes float{
0%, 100%{
transform:translateY(0);
}
50%{
transform:translateY(-15px);
}
}


h2{
font-size:32px;
font-family:'Noto Serif KR', serif;
margin-bottom:30px;
color:#8b7765;
}

/* 갤러리 */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:16px;
width:90%;
max-width:950px;
margin-top:40px;
}

.gallery img{
width:100%;
height:180px;
object-fit:cover;
border-radius:16px;
cursor:pointer;
transition:transform .3s, box-shadow .3s;
border:3px solid #fff;
box-shadow:0 8px 20px rgba(139,119,101,0.15);
}

.gallery img:hover{
transform:scale(1.08) rotate(2deg);
box-shadow:0 12px 30px rgba(139,119,101,0.25);
}

/* 사진 확대 */

.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
backdrop-filter:blur(5px);
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:16px;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.modal.active{
display:flex;
animation:fadeIn 0.3s;
}

/* 선물 */

.gift{
font-size:60px;
cursor:pointer;
transition:transform .3s;
filter:grayscale(0);
}

.gift:hover{
transform:scale(1.1);
}

.hidden{
display:none;
}

.birthday{
color:#d88c9a;
font-weight:700;
}

/* 입력창 */

input{
padding:14px 20px;
border-radius:12px;
border:2px solid rgba(139,119,101,0.25);
margin-top:20px;
width:280px;
font-family:'Gowun Dodum';
font-size:16px;
transition:all 0.3s;
background:rgba(255,255,255,0.9);
color:#5a4a42;
}

input:focus{
outline:none;
border-color:#8b7765;
box-shadow:0 0 0 4px rgba(139,119,101,0.1);
}

input::placeholder{
color:#b8a9a1;
}

/* 스크롤 안내 */

.scroll-hint{
animation:bounce 2s infinite;
opacity:0.7;
}

@keyframes bounce{
0%, 100%{
transform:translateY(0);
}
50%{
transform:translateY(-10px);
}
}

/* 이모티콘 필터 제거 */

.emoji{
filter:grayscale(0) !important;
-webkit-filter:grayscale(0) !important;
color:initial !important;
background:none !important;
-webkit-background-clip:initial !important;
-webkit-text-fill-color:initial !important;
background-clip:initial !important;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2d2d4e7a6c.mp3?filename=happy-birthday-to-you-piano-version-13976.mp3">
</audio>

<section class="section">

<div class="hero">
<img src="images/12.png">
<div class="hero-name">오늘의 주인공 <span class="emoji">🥳</span></div>
</div>

<h1>재은아 <span class="birthday"><br>생일 축하해 <span class="emoji">🎂</span></span></h1>

<div class="subtitle">
<span class="emoji">🎊</span> 동국대 최고미녀 임재은 탄생일 <span class="emoji">🎊</span>
</div>

<p style="margin-bottom:50px;font-size:18px;">촛불 클릭! <span class="emoji">🕯️</span></p>

<div class="cake" onclick="blowCandle()">

<div class="candle">
<div class="flame" id="flame"></div>
</div>

</div>

<p class="scroll-hint" style="margin-top:100px;font-size:17px;">이제 밑으로 스크롤해서 편지 확인해봐 공주 <span class="emoji">💌</span></p>

</section>

<section class="section">

<h2><span class="emoji">💌</span> 편지</h2>

<div class="letter empty" id="letter"></div>

<button onclick="startTyping()">
편지 읽기 <span class="emoji">📖</span>
</button>

</section>

<section class="section">

<h2><span class="emoji">📸</span> Memories</h2>

<div class="gallery">

<img src="images/1.png">
<img src="images/2.png">
<img src="images/3.png">
<img src="images/4.png">
<img src="images/5.png">
<img src="images/6.png">
<img src="images/7.png">
<img src="images/8.png">
<img src="images/9.png">
<img src="images/10.png">
<img src="images/11.png">

</div>

<div id="modal" class="modal" onclick="closeModal()">
<img id="modalImg">
</div>

</section>

<section class="section">

<h2><span class="emoji">✨</span> 마지막 페이지 <span class="emoji">✨</span></h2>

<p style="font-size:18px;">오늘의 소원을 하나 빌어봐 <span class="emoji">🌟</span></p>

<input id="wishInput" placeholder="소원을 적어보세요 ⭐️">

<br>

<button onclick="makeWish()">소원 보내기 <span class="emoji">✨</span></button>

<div id="wishResult" style="margin-top:25px;font-size:19px;font-weight:500;"></div>

</section>

<script>

/* 촛불 */

function blowCandle(){
const flame = document.getElementById('flame')
flame.style.animation = 'none'
flame.style.transform = 'translateX(-50%) scale(0)'
flame.style.opacity = '0'
setTimeout(() => {
flame.style.display = 'none'
}, 300)
startConfetti()
}

/* 편지 */

const text=`To.재은

Happy Birthday!

캠우리를 통해 만난 인연이 너여서 너무 행복해.
수많은 사람들 속에서 우리가 한 팀으로 만나고, 그 팀의 팀장이 너였다는 게 아직도 참 신기하고 고마워.
항상 누구보다 먼저 고민하고, 우리를 챙겨주고, 묵묵히 팀을 이끌어줘서 덕분에 우리는 더 즐겁고 따뜻하게 그 시간을 보낼 수 있었던 것 같아. 
나에게 캠우리의 기억을 떠올리면 가장 먼저 재은이가 생각나.
아마 너는 별것 아닌 일처럼 생각할지도 모르지만 누군가에게는 그렇게 마음 써주는 사람이 있다는 것 자체가 정말 큰 힘이 되더라.
너를 보며 나도 많이 배우고 더 성장할 수 있었어🥰
앞으로 재은이가 하고 싶은 일, 이루고 싶은 꿈들이 하나씩 다 이루어지길 진심으로 바라. 
재은이가 가진 따뜻함과 진심이라면 어디에서든 분명 많은 사람들에게 좋은 영향을 줄 거라고 믿어.

우리의 인연이 그때의 추억으로만 끝나는 게 아니라, 오래오래 서로의 삶 속에 남아있는 인연이었으면 좋겠다.

생일 정말 축하해
그리고 우리 팀장이어서, 재은이어서 고마워.

사랑해 재은 🤍
From.아영`

let i=0

function startTyping(){

const el=document.getElementById("letter")

el.classList.remove("empty")
el.innerHTML=""
i = 0

const interval=setInterval(()=>{

el.innerHTML+=text[i]

i++

if(i>=text.length)clearInterval(interval)

},35)

}

/* 폭죽 */

function startConfetti(){

const explosionPoints = [
{x: window.innerWidth * 0.15, y: window.innerHeight * 0.25},
{x: window.innerWidth * 0.5, y: window.innerHeight * 0.15},
{x: window.innerWidth * 0.85, y: window.innerHeight * 0.25},
{x: window.innerWidth * 0.3, y: window.innerHeight * 0.45},
{x: window.innerWidth * 0.7, y: window.innerHeight * 0.45},
{x: window.innerWidth * 0.5, y: window.innerHeight * 0.6}
]

explosionPoints.forEach((point, index) => {
setTimeout(() => {
createExplosion(point.x, point.y)
}, index * 180)
})
}

function createExplosion(centerX, centerY){

const particleCount = 60

for(let i = 0; i < particleCount; i++){

const confetti = document.createElement("div")

const angle = (Math.PI * 2 * i) / particleCount + (Math.random() * 0.3 - 0.15)
const velocity = Math.random() * 7 + 5
const vx = Math.cos(angle) * velocity
const vy = Math.sin(angle) * velocity

const size = Math.random() * 12 + 5
const shapes = ['50%', '0%', '20%']
const shape = shapes[Math.floor(Math.random() * shapes.length)]

const colors = [
'hsl(340, 80%, 70%)',
'hsl(350, 85%, 75%)',
'hsl(30, 80%, 70%)',
'hsl(200, 75%, 70%)',
'hsl(280, 75%, 70%)',
'hsl(50, 85%, 70%)',
'hsl(160, 70%, 65%)'
]

confetti.style.position = "fixed"
confetti.style.width = size + "px"
confetti.style.height = size + "px"
confetti.style.background = colors[Math.floor(Math.random() * colors.length)]
confetti.style.left = centerX + "px"
confetti.style.top = centerY + "px"
confetti.style.borderRadius = shape
confetti.style.zIndex = "9999"
confetti.style.opacity = "1"
confetti.style.pointerEvents = "none"
confetti.style.boxShadow = "0 0 10px rgba(255,255,255,0.5)"

document.body.appendChild(confetti)

let posX = centerX
let posY = centerY
let velocityX = vx
let velocityY = vy
const gravity = 0.35
const drag = 0.99
let opacity = 1
let rotation = Math.random() * 360
const rotationSpeed = Math.random() * 10 - 5

const anim = setInterval(() => {

velocityY += gravity
velocityX *= drag
posX += velocityX
posY += velocityY
opacity -= 0.012
rotation += rotationSpeed

confetti.style.left = posX + "px"
confetti.style.top = posY + "px"
confetti.style.opacity = opacity
confetti.style.transform = `rotate(${rotation}deg)`

if(opacity <= 0 || posY > window.innerHeight + 100){
confetti.remove()
clearInterval(anim)
}

}, 16)

}
}

/* 사진 확대 */

const galleryImages=document.querySelectorAll(".gallery img")
const modal=document.getElementById("modal")
const modalImg=document.getElementById("modalImg")

galleryImages.forEach(img=>{
img.addEventListener("click",()=>{
modal.classList.add("active")
modalImg.src=img.src
})
})

function closeModal(){
modal.classList.remove("active")
}

/* 파티클 */

const canvas=document.getElementById('bg')
const ctx=canvas.getContext('2d')

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<100;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
d:Math.random()*1.5+0.5,
color: `rgba(${200 + Math.random()*30}, ${180 + Math.random()*30}, ${160 + Math.random()*30}, ${Math.random()*0.3+0.2})`
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

ctx.fillStyle = p.color
ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fill()

p.y+=p.d

if(p.y>canvas.height){
p.y=0
p.x=Math.random()*canvas.width
}

})

requestAnimationFrame(draw)

}

function makeWish(){

const wish=document.getElementById("wishInput").value
const result=document.getElementById("wishResult")

if(wish===""){
result.innerHTML="💭 소원을 적어줘"
result.style.color="#8b7765"
return
}

result.innerHTML="✨ 재은이의 소원이 이루어지길 🙏✨"
result.style.color="#8b7765"

startConfetti()

setTimeout(() => {
result.innerHTML += "<br><br>🎂 행복한 생일 보내 🎂"
}, 1500)

}

draw()

window.addEventListener('resize', () => {
canvas.width = window.innerWidth
canvas.height = window.innerHeight
})

</script>

</body>
</html>
