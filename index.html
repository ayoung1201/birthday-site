<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{
 margin:0;
 font-family:'Noto Serif KR',serif;
 background:#f5efe6;
 overflow-x:hidden;
 color:#5a4a42;
}

/* moving background */
.bg{
 position:fixed;
 width:200%;
 height:200%;
 background:radial-gradient(circle,#fff7ef 0%,#f5efe6 60%);
 animation:moveBg 25s linear infinite;
 z-index:-1;
}
@keyframes moveBg{
 0%{transform:translate(-10%,-10%)}
 50%{transform:translate(-20%,-15%)}
 100%{transform:translate(-10%,-10%)}
}

.section{
 min-height:100vh;
 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
 padding:40px 20px;
 text-align:center;
}

h1{
 font-size:48px;
 margin-bottom:10px;
}

.subtitle{
 opacity:0.8;
 margin-bottom:40px;
}

/* cake */
.cake{
 position:relative;
 width:120px;
 height:90px;
 background:#e6cfc2;
 border-radius:8px;
 margin-top:20px;
}

.candle{
 position:absolute;
 top:-35px;
 left:50%;
 transform:translateX(-50%);
 width:12px;
 height:35px;
 background:#fff;
 border-radius:4px;
}

.flame{
 position:absolute;
 top:-12px;
 left:50%;
 transform:translateX(-50%);
 width:14px;
 height:14px;
 background:#ffd27a;
 border-radius:50%;
 animation:flicker 0.4s infinite alternate;
}

@keyframes flicker{
 from{transform:translateX(-50%) scale(1)}
 to{transform:translateX(-50%) scale(1.2)}
}

/* letter */
.letter{
 max-width:600px;
 line-height:1.8;
 font-size:18px;
 background:rgba(255,255,255,0.6);
 padding:40px;
 border-radius:20px;
 backdrop-filter:blur(6px);
}

/* gallery */
.gallery{
 display:flex;
 gap:20px;
 overflow-x:auto;
 padding:20px;
}

.gallery img{
 height:260px;
 border-radius:14px;
 flex-shrink:0;
 box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.scroll{
 font-size:14px;
 margin-top:30px;
 opacity:0.7;
}
</style>
</head>
<body>

<div class="bg"></div>

<!-- music -->
<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2d2d4e7a6c.mp3?filename=happy-birthday-to-you-piano-version-13976.mp3" type="audio/mpeg">
</audio>

<!-- intro -->
<section class="section">
<h1>Happy Birthday 🎂</h1>
<div class="subtitle">오늘은 세상에서 가장 특별한 날</div>

<div class="cake">
<div class="candle">
<div class="flame"></div>
</div>
</div>

<div class="scroll">스크롤해서 편지를 읽어봐 💌</div>
</section>

<!-- letter -->
<section class="section">
<div class="letter">
<p>
생일 정말 축하해.
</p>
<p>
네가 태어난 덕분에 세상에 조금 더 웃음이 생긴 것 같아.
오늘 하루는 평소보다 더 많이 웃고,
더 많이 행복했으면 좋겠다.
</p>
<p>
앞으로의 모든 날들도
지금처럼 따뜻하고 멋진 순간들로 가득하길 바라.
</p>
<p>
Happy Birthday ✨
</p>
</div>
</section>

<!-- photo gallery -->
<section class="section">
<h2>Memories 📸</h2>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1519681393784-d120267933ba">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
</div>
</section>

</body>
</html>
